schema_version: 1

context:
  version: "2.2.4"

package:
  name: pnpm-licenses
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@quantco/pnpm-licenses/-/pnpm-licenses-${{ version }}-0.tgz
  sha256: b1747f32edbb0ea9757a9730a6b9615ad805b51fa2ab9ca84f86d879d891f4fc

build:
  number: 1

requirements:
  build:
    - nodejs
  host:
    - nodejs
    - pnpm >=8.6.12
  run:
    - nodejs

tests:
  - script:
      - pnpm-licenses --version
  - package_contents:
      strict: true
      bin:
        - pnpm-licenses
      files:
        - if: unix
          then:
            - lib/node_modules/@quantco/pnpm-licenses/**/*
          else:
            - Library/share/pnpm-licenses/**/*
            - Library/share/pnpm-licenses/node_modules/.bin/pnpm-licenses.cmd

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Generate third party license disclaimers in pnpm-based projects
  homepage: https://github.com/Quantco/pnpm-licenses

extra:
  recipe-maintainers:
    - JaninaWibkerQC
    - pavelzw
    - xhochy
