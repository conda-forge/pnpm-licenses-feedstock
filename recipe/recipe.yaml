schema_version: 1

context:
  version: "2.4.2"

package:
  name: pnpm-licenses
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@quantco/pnpm-licenses/-/pnpm-licenses-${{ version }}.tgz
  sha256: 99294c52984260f6f9700d02e587a41cdd040625bc4886da0cdc93fc92d830ed

build:
  number: 0

requirements:
  build:
    - nodejs
  host:
    - nodejs
    - pnpm >=8.6.12
  run:
    - nodejs

tests:
  - script:
      - pnpm-licenses --version
  - package_contents:
      strict: true
      bin:
        - pnpm-licenses
      files:
        - if: unix
          then:
            - lib/node_modules/@quantco/pnpm-licenses/**/*
          else:
            - Library/share/pnpm-licenses/**/*
            - Library/share/pnpm-licenses/node_modules/.bin/pnpm-licenses.cmd

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Generate third party license disclaimers in pnpm-based projects
  homepage: https://github.com/Quantco/pnpm-licenses

extra:
  recipe-maintainers:
    - JaninaWibkerQC
    - pavelzw
    - xhochy
